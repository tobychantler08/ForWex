<!DOCTYPE html>
<html>

<head>

<title>Placement Map</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

</head>

<body>

<header>

<h1>ForWex</h1>

<nav>
<a href="index.html">Home</a>
<a href="placements.html">Placements</a>
<a href="map.html">Map</a>
</nav>

</header>

<div class="container">

<h1>Placement Map</h1>

<div class="map-container">

<div id="map" style="height:500px; flex:2;"></div>

<div id="info">

<h3>Placement Info</h3>
<p>Click a marker</p>

</div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([51.5074,-0.1278],11);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);


/* placements */

const placements = [

{
id:"google",
name:"Google",
title:"Software Engineering Placement",
lat:51.5033,
lng:-0.1195,
students:["Alex","Sam","Jamie"]
},

{
id:"deloitte",
name:"Deloitte",
title:"Business Internship",
lat:51.5154,
lng:-0.0839,
students:["Taylor"]
},

{
id:"bbc",
name:"BBC",
title:"Media Work Experience",
lat:51.5187,
lng:-0.1430,
students:["Ella","Noah","Lucas","Sofia","Liam"]
}

];


/* markers */

placements.forEach(p=>{

let marker = L.marker([p.lat,p.lng]).addTo(map);

marker.bindPopup(p.name);

marker.on("click",function(){

let info = document.getElementById("info");

info.innerHTML =

"<h3>"+p.name+"</h3>"+
"<p>"+p.title+"</p>"+
"<p>"+p.students.length+" students attending</p>"+
"<button onclick=\"joinPlacement('"+p.id+"')\">I'm attending</button>";

});

});


function joinPlacement(id){

let joined = JSON.parse(localStorage.getItem("joined")) || [];

if(!joined.includes(id)){

joined.push(id);

localStorage.setItem("joined", JSON.stringify(joined));

alert("You joined this placement!");

}

}

</script>

</body>
</html>
