<!DOCTYPE html>
<html>
<head>
  <title>Placement Map - ForWex</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>

<h1>Placement Map</h1>
<div id="map" style="height:400px;"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  var map = L.map('map').setView([51.5074, -0.1278], 12);

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  // Load placements from JSON
  fetch('data/placements.json')
    .then(response => response.json())
    .then(placements => {
      placements.forEach(p => {
        L.marker([p.lat, p.lng]).addTo(map)
          .bindPopup(p.company + ": " + p.title);
      });
    })
    .catch(err => console.log("Error loading placements:", err));
</script>
