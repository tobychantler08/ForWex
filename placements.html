<nav>

<a href="map.html">Map</a>
</nav>

</header>

<div class="container">

<h1>Work Experience Placements</h1>

<ul id="placementList">

<li class="placement-card">

<h3>Google</h3>
<p>Software Engineering Placement</p>
<p><strong>3 students attending</strong></p>

<div class="buttons">

<a href="map.html?placement=google">
<button>View Map</button>
</a>

<button onclick="joinPlacement('google')">
I'm attending
</button>

</div>

</li>


<li class="placement-card">

<h3>Deloitte</h3>
<p>Business Internship</p>
<p><strong>1 student attending</strong></p>

<div class="buttons">

<a href="map.html?placement=deloitte">
<button>View Map</button>
</a>

<button onclick="joinPlacement('deloitte')">
I'm attending
</button>

</div>

</li>


<li class="placement-card">

<h3>BBC</h3>
<p>Media Work Experience</p>
<p><strong>5 students attending</strong></p>

<div class="buttons">

<a href="map.html?placement=bbc">
<button>View Map</button>
</a>

<button onclick="joinPlacement('bbc')">
I'm attending
</button>

</div>

</li>

</ul>

</div>

<script>

function joinPlacement(id){

let placements = JSON.parse(localStorage.getItem("joined")) || [];

if(!placements.includes(id)){

placements.push(id);

localStorage.setItem("joined", JSON.stringify(placements));

alert("You are now attending this placement!");

}else{

alert("You already joined this placement");

}

}

</script>
